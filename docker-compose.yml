services:
  postgres:
    image: postgres:16
    container_name: github_analytics_postgres
    environment:
      POSTGRES_DB: github_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d github_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: github_analytics_etl
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: github_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: python run_pipeline.py

  dashboard:
    build: .
    container_name: github_analytics_dashboard
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: github_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run dashboard/app.py --server.address 0.0.0.0

  airflow:
    build: .
    container_name: github_analytics_airflow
    environment:
      AIRFLOW_HOME: /app/airflow_home
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////app/airflow_home/airflow.db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: github_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        airflow scheduler &
        exec airflow webserver --port 8080

volumes:
  postgres_data:
